<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Visual Trip</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <h1>🚌 Visual Trip</h1>
      <p>School Field Trip Management</p>
    </div>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" type="email" placeholder="you@school.edu" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" id="password" type="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" type="submit" id="login-btn">Sign In</button>
    </form>
    <p style="text-align:center;font-size:.875rem;color:var(--gray-500);margin-top:1.25rem;">
      New teacher or parent? <a href="/signup">Create an account</a>
    </p>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--gray-200);">
      <p style="font-size:.75rem;color:var(--gray-500);margin-bottom:.5rem;font-weight:600;">Demo accounts</p>
      <div style="font-size:.75rem;color:var(--gray-500);line-height:1.8;">
        admin@school.edu / admin123<br>
        counselor@school.edu / counselor123<br>
        teacher1@school.edu / teacher123<br>
        bus1@citybusco.com / bus123<br>
        parent.alice@example.com / parent123
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { setAuth, getAuth } from '/app.js';

  // Redirect if already logged in
  if (getAuth()) location.href = '/dashboard';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Login failed');
      setAuth(json.data);
      location.href = '/dashboard';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
